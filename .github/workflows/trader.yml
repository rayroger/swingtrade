name: Swing Trading Bot

on:
  schedule:
    # hourly during US market hours
    - cron: "30 13-20 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Bot mode"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - backtest

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      BOT_MODE: ${{ github.event.inputs.mode || 'live' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        run: python -m bot.main
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          BOT_MODE: ${{ env.BOT_MODE }}
